exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

[mode.main.binding]

# Letter mnemonic workspaces
alt-n = "workspace N"
alt-p = "workspace P"
alt-w = "workspace W"
alt-c = "workspace C"
alt-e = "workspace E"
alt-t = "workspace T"
alt-s = "workspace S"
alt-m = "workspace M"
alt-f = "workspace F"

# Number workspaces
alt-0 = "workspace 0"
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"

# Toggle bar gap (laptop vs external monitor)
alt-g = "exec-and-forget $HOME/.config/aerospace/gaps.sh"

alt-tab = "workspace next --wrap-around"
alt-shift-tab = "workspace prev --wrap-around"

# Auto-assign apps to workspaces
[[on-window-detected]]
if.app-id = 'notion.id'
run = 'move-node-to-workspace N'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
if.window-title-regex-substring = 'Personal'
run = 'move-node-to-workspace P'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
if.window-title-regex-substring = 'Work'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace E'

[[on-window-detected]]
if.app-id = 'dev.warp.Warp-Stable'
run = 'move-node-to-workspace T'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace S'

[[on-window-detected]]
if.app-id = 'org.whispersystems.signal-desktop'
run = 'move-node-to-workspace M'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'move-node-to-workspace F'

[gaps]
outer.top = 40
