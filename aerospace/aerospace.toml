exec-on-workspace-change = ['/bin/bash', '-c',
  'sketchybar --trigger aerospace_workspace_change FOCUSED_WORKSPACE=$AEROSPACE_FOCUSED_WORKSPACE'
]

[mode.main.binding]

# Letter mnemonic workspaces
alt-n = "workspace N"
alt-p = "workspace P"
alt-w = "workspace W"
alt-c = "workspace C"
alt-e = "workspace E"
alt-t = "workspace T"
alt-s = "workspace S"
alt-m = "workspace M"
alt-f = "workspace F"

# Number workspaces
alt-0 = "workspace 0"
alt-1 = "workspace 1"
alt-2 = "workspace 2"
alt-3 = "workspace 3"
alt-4 = "workspace 4"
alt-5 = "workspace 5"
alt-6 = "workspace 6"
alt-7 = "workspace 7"
alt-8 = "workspace 8"
alt-9 = "workspace 9"

# Move window to letter mnemonic workspaces
alt-shift-n = ["move-node-to-workspace N", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-p = ["move-node-to-workspace P", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-w = ["move-node-to-workspace W", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-c = ["move-node-to-workspace C", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-e = ["move-node-to-workspace E", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-t = ["move-node-to-workspace T", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-s = ["move-node-to-workspace S", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-m = ["move-node-to-workspace M", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-f = ["move-node-to-workspace F", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]

# Move window to number workspaces
alt-shift-0 = ["move-node-to-workspace 0", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-1 = ["move-node-to-workspace 1", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-2 = ["move-node-to-workspace 2", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-3 = ["move-node-to-workspace 3", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-4 = ["move-node-to-workspace 4", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-5 = ["move-node-to-workspace 5", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-6 = ["move-node-to-workspace 6", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-7 = ["move-node-to-workspace 7", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-8 = ["move-node-to-workspace 8", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]
alt-shift-9 = ["move-node-to-workspace 9", "exec-and-forget sketchybar --trigger aerospace_workspace_change"]

alt-tab = "workspace next --wrap-around"
alt-shift-tab = "workspace prev --wrap-around"

# Auto-assign apps to workspaces
[[on-window-detected]]
if.app-id = 'notion.id'
run = 'move-node-to-workspace N'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
if.window-title-regex-substring = 'Personal'
run = 'move-node-to-workspace P'

[[on-window-detected]]
if.app-id = 'com.apple.Safari'
if.window-title-regex-substring = 'Work'
run = 'move-node-to-workspace W'

[[on-window-detected]]
if.app-id = 'com.google.Chrome'
run = 'move-node-to-workspace C'

[[on-window-detected]]
if.app-id = 'com.microsoft.VSCode'
run = 'move-node-to-workspace E'

[[on-window-detected]]
if.app-id = 'dev.warp.Warp-Stable'
run = 'move-node-to-workspace T'

[[on-window-detected]]
if.app-id = 'com.tinyspeck.slackmacgap'
run = 'move-node-to-workspace S'

[[on-window-detected]]
if.app-id = 'org.whispersystems.signal-desktop'
run = 'move-node-to-workspace M'

[[on-window-detected]]
if.app-id = 'com.apple.finder'
run = 'move-node-to-workspace F'

[gaps]
outer.top = 10
